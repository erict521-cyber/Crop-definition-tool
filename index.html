<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Tool</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 10px; background:#f5f5f5; }
    #canvasWrapper { position: relative; display:inline-block; }
    canvas { border:2px solid #333; max-width:100%; }
    .controls { margin-bottom:10px; }
    textarea { width:100%; height:200px; }
  </style>
</head>
<body>

<div class="controls">
  <input type="file" id="upload">
  <button onclick="clearBoxes()">Clear</button>
  <button onclick="copyData()">Copy JSON</button>
</div>

<div id="canvasWrapper">
  <canvas id="canvas"></canvas>
</div>

<h3>Output</h3>
<textarea id="output"></textarea>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let img = new Image();
let boxes = [];
let start = null;
let drawing = false;

document.getElementById("upload").onchange = e => {
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = () => {
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      draw();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
};

canvas.addEventListener("mousedown", e => {
  start = getMouse(e);
  drawing = true;
});

canvas.addEventListener("mousemove", e => {
  if (!drawing) return;
  let current = getMouse(e);
  draw();
  drawBox(start, current);
});

canvas.addEventListener("mouseup", e => {
  drawing = false;
  let end = getMouse(e);

  let box = normalize(start, end);
  boxes.push(box);

  updateOutput();
  draw();
});

function getMouse(e){
  let rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left),
    y: (e.clientY - rect.top)
  };
}

function normalize(a,b){
  return {
    x: Math.min(a.x,b.x),
    y: Math.min(a.y,b.y),
    w: Math.abs(a.x-b.x),
    h: Math.abs(a.y-b.y)
  };
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  boxes.forEach(b => drawBox({x:b.x,y:b.y},{x:b.x+b.w,y:b.y+b.h}));
}

function drawBox(a,b){
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);
}

function updateOutput(){
  let data = boxes.map((b,i)=>{
    let x1 = b.x / canvas.width;
    let y1 = b.y / canvas.height;
    let x2 = (b.x+b.w)/canvas.width;
    let y2 = (b.y+b.h)/canvas.height;

    return {
      slot: i+1,
      normalized: [x1,y1,x2,y2],
      thousandths: [
        Math.round(x1*1000),
        Math.round(y1*1000),
        Math.round(x2*1000),
        Math.round(y2*1000)
      ]
    };
  });

  document.getElementById("output").value =
    JSON.stringify(data,null,2);
}

function clearBoxes(){
  boxes = [];
  draw();
  updateOutput();
}

function copyData(){
  navigator.clipboard.writeText(
    document.getElementById("output").value
  );
}
</script>

</body>
</html>
